<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strategy Builder Training | Melio Help Center</title>
<style>
  :root{
    --ink:#212124; --muted:#8e8e90; --line:#ececf1; --purple:#7849FF;
    --lav:#eaedfe; --lav2:#f3f1ff; --bg:#fff;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);}
  a{color:inherit;text-decoration:none;}
  h1,h2{font-weight:600;letter-spacing:-.01em;}
  .topbar{display:flex;align-items:center;gap:18px;padding:22px 30px;border-bottom:1px solid var(--line);}
  .logo{display:flex;align-items:center;gap:11px;font-size:20px;}
  .wordmark{color:var(--purple);font-weight:600;font-size:26px;letter-spacing:-.02em;}
  .logo .light{color:var(--muted);font-size:18px;}
  .wrap{max-width:800px;margin:0 auto;padding:36px 30px 80px;}
  .hero{background:var(--lav);border-radius:20px;padding:46px 48px;display:flex;align-items:center;gap:32px;}
  .hero .copy{flex:1;min-width:0;}
  .hero h1{margin:0 0 14px;font-size:38px;line-height:1.05;}
  .hero h1 em{color:var(--purple);font-style:italic;}
  .hero p{margin:0;color:#4a4a4f;font-size:16.5px;line-height:1.55;max-width:580px;}
  .hero .art{flex:0 0 160px;width:160px;height:160px;}
  .hero .art img{width:100%;height:100%;object-fit:contain;}
  @media(max-width:640px){.hero{flex-direction:column;}.hero .art{order:-1;}}
  .card{border:1px solid var(--line);border-radius:18px;padding:30px 30px 24px;margin-top:28px;}
  .card ul{list-style:none;margin:0;padding:0;}
  .card li{display:flex;align-items:center;gap:12px;padding:12px 0;font-size:16px;border-bottom:1px solid var(--line);}
  .card li:last-child{border-bottom:none;}
  .card li svg{flex:0 0 auto;color:var(--purple);}
  .card li a:hover{color:var(--purple);}
  .hero .btn{display:inline-block;margin-top:22px;background:var(--purple);color:#fff;padding:12px 24px;border-radius:30px;font-weight:600;font-size:15px;}
  .hero .btn:hover{background:#6a3df0;}
</style>
</head>
<body>
  <header class="topbar">
    <div class="logo"><span class="wordmark">melio</span> <span class="light">Help Center</span></div>
  </header>
  <main class="wrap">
    <section class="hero">
      <div class="copy">
        <h1>Your Guide to <em>Strategy Builder</em></h1>
        <p>Learn how to build rules, group them into strategies, and compare versions before rolling changes out.</p>
        <a class="btn" href="https://mos.production.melioservices.com/feature-strategy-builder/strategies" target="_blank" rel="noopener">Open Strategy Builder &rarr;</a>
      </div>
      <div class="art"><img src="assets/shield-mascot.png" alt="Strategy Builder shield mascot"></div>
    </section>
    <div class="card">
      <ul>
        <li><a href="what-is-strategy-builder.html">What is Strategy Builder?</a></li>
        <li><a href="strategies-vs-rules.html">Strategies vs. rules: key concepts</a></li>
        <li><a href="rule-editor.html">The Rule Editor</a></li>
        <li><a href="compare-versions.html">Comparing strategy versions</a></li>
      </ul>
    </div>
  </main>
</body>
</html>
